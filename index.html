<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Keys | Vault</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #bb86fc; --bg: #0a0a0a; --card: #161616; --input: #222; --text: #ffffff; --danger: #cf6679; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .vault-container { width: 100%; max-width: 400px; padding: 40px 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 40px; color: var(--primary); margin-bottom: 10px; }
        .header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .btn-google { display: flex; align-items: center; justify-content: center; width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: white; color: #000; margin-bottom: 20px; }
        .btn-google i { color: #4285F4; margin-right: 12px; font-size: 18px; }
        .divider { display: flex; align-items: center; margin: 25px 0; color: #444; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #222; }
        .divider span { padding: 0 10px; font-size: 11px; text-transform: uppercase; font-weight: 700; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 16px; background: var(--input); border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; font-size: 16px; }
        .main-btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; }
        .secondary-btn { background: transparent; border: 2px solid var(--primary); color: var(--primary); padding: 12px; border-radius: 14px; width: 100%; font-weight: 700; cursor: pointer; margin-bottom: 25px; }
        .link-text { display: block; text-align: center; margin-top: 20px; color: #888; font-size: 13px; cursor: pointer; background: none; border: none; width: 100%; }
        .key-card { background: var(--card); padding: 20px; border-radius: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .key-info h4 { margin: 0; color: var(--primary); font-size: 18px; }
        .key-info p { margin: 6px 0 0; color: #777; font-size: 13px; }
        .actions { display: flex; gap: 10px; }
        .view-btn { background: #222; border: none; color: var(--primary); width: 45px; height: 45px; border-radius: 12px; cursor: pointer; }
        .delete-btn { background: #222; border: none; color: var(--danger); width: 45px; height: 45px; border-radius: 12px; cursor: pointer; }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="vault-container">
        <div class="header">
            <i class="fa-solid fa-vault"></i>
            <h1>Happy Keys</h1>
        </div>

        <div id="auth-view" class="fade-in">
            <button class="btn-google" id="btn-google-login">
                <i class="fa-brands fa-google"></i> Continuar con Google
            </button>
            <div class="divider"><span>O con tu cuenta</span></div>
            <div class="form-group"><input type="email" id="auth-email" placeholder="Correo electrónico"></div>
            <div class="form-group"><input type="password" id="auth-pass" placeholder="Contraseña"></div>
            <button class="main-btn" onclick="emailAuth('login')">ENTRAR</button>
            <button class="link-text" onclick="emailAuth('register')">Crear una cuenta nueva</button>
        </div>

        <div id="app-view" class="hidden fade-in">
            <button id="btn-show-add" class="secondary-btn" onclick="toggleAddForm()">+ AÑADIR LLAVE</button>
            <div id="add-form" class="hidden" style="background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--primary);">
                <div class="form-group"><input type="text" id="new-name" placeholder="App (ej: Netflix)"></div>
                <div class="form-group"><input type="text" id="new-user" placeholder="Usuario"></div>
                <div class="form-group"><input type="password" id="new-pass" placeholder="Contraseña"></div>
                <button class="main-btn" onclick="saveKey()">GUARDAR</button>
                <button class="link-text" onclick="toggleAddForm()">Cancelar</button>
            </div>
            <div id="keys-list"></div>
            <button class="link-text" onclick="logout()" style="color: var(--danger);">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDJO8g2e3pdZyMb8K8cVKKwZgjLepHqTLc",
            authDomain: "happykeys.firebaseapp.com",
            projectId: "happykeys",
            storageBucket: "happykeys.firebasestorage.app",
            messagingSenderId: "163718047544",
            appId: "1:163718047544:web:d5590d6f5c45de97f603cd"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const secret = "HK_ENCRYPT_PRO_2026";

        // --- LÓGICA DE LOGIN GOOGLE MEJORADA ---
        document.getElementById('btn-google-login').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Redirect es mucho más estable para APK y navegadores móviles
            auth.signInWithRedirect(provider);
        });

        // Capturar el resultado del redireccionamiento al cargar la página
        auth.getRedirectResult().then((result) => {
            if (result.user) console.log("Login exitoso vía Redirect");
        }).catch((error) => {
            if(error.code !== 'auth/popup-closed-by-user') {
                console.error("Error en redirect:", error);
            }
        });

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                setTimeout(loadKeys, 500);
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('app-view').classList.add('hidden');
            }
        });

        // --- RESTO DE FUNCIONES ---
        async function emailAuth(mode) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if(mode === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (e) { alert(e.message); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        function toggleAddForm() {
            document.getElementById('add-form').classList.toggle('hidden');
            document.getElementById('btn-show-add').classList.toggle('hidden');
        }

        async function saveKey() {
            const name = document.getElementById('new-name').value;
            const user = document.getElementById('new-user').value;
            const pass = document.getElementById('new-pass').value;
            if(!name || !pass) return alert("Faltan datos");
            try {
                const encrypted = CryptoJS.AES.encrypt(pass, secret).toString();
                await db.collection("vault").add({
                    owner: auth.currentUser.uid,
                    name, user, pass: encrypted, date: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('new-name').value = '';
                document.getElementById('new-user').value = '';
                document.getElementById('new-pass').value = '';
                toggleAddForm();
            } catch (e) { alert("Error al guardar."); }
        }

        function loadKeys() {
            if (!auth.currentUser) return;
            db.collection("vault").where("owner", "==", auth.currentUser.uid)
              .onSnapshot(snap => {
                const list = document.getElementById('keys-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = 'key-card fade-in';
                    card.innerHTML = `
                        <div class="key-info"><h4>${data.name}</h4><p>${data.user || ''}</p></div>
                        <div class="actions">
                            <button class="view-btn" onclick="revealKey('${data.pass}', '${data.name}')"><i class="fa-solid fa-fingerprint"></i></button>
                            <button class="delete-btn" onclick="deleteKey('${doc.id}', '${data.name}')"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                    list.appendChild(card);
                });
            });
        }

        function revealKey(cipher, title) {
